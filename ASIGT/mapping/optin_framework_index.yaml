# =============================================================================
# OPT-IN Framework Index — ATA-to-Axis Mapping
# AEROSPACEMODEL Pipeline Configuration
# Version: 1.0.0
# Last Updated: 2026-01-27
# =============================================================================
#
# Maps all 79+ ATA chapters to their OPT-IN Framework axes and subdomains.
#
# OPT-IN Axes:
#   O — Organizations (governance, policy, airworthiness)
#   P — Programs (ground handling, servicing, placards)
#   T — Technologies (on-board systems, structures, propulsion)
#   I — Infrastructures (ground support, H2 GSE)
#   N — Neural Networks (AI/ML, governance, traceability)
#
# Used by the pipeline for SNS classification, BREX scoping, and
# publication structure.
# =============================================================================

metadata:
  framework: "OPT-IN"
  version: "1.0.0"
  description: "Complete ATA chapter reference mapped to OPT-IN Framework axes"
  last_updated: "2026-01-27"

# =============================================================================
# AXIS DEFINITIONS
# =============================================================================
axes:
  O:
    name: "O-ORGANIZATIONS"
    description: "Governance, policy, airworthiness limitations"
    ata_range: "00-05"

  P:
    name: "P-PROGRAMS"
    description: "Ground handling, servicing, placards and markings"
    ata_range: "06-12"

  T:
    name: "T-TECHNOLOGIES"
    description: "On-board systems, structures, propulsion"
    ata_range: "20-80, 95, 97"
    subdomains:
      A:
        name: "A-AIRFRAME_CABINS"
        ata_chapters: ["20", "25", "44", "50", "51", "52", "53", "54", "55", "56", "57"]
      M:
        name: "M-MECHANICS"
        ata_chapters: ["27", "29", "32"]
      E1:
        name: "E1-ENVIRONMENT"
        ata_chapters: ["21", "26", "30", "35", "36", "37", "38", "47"]
      D:
        name: "D-DATA"
        ata_chapters: ["31", "45"]
      I:
        name: "I-INFORMATION"
        ata_chapters: ["46"]
      E2:
        name: "E2-ENERGY"
        ata_chapters: ["24", "49"]
      E3:
        name: "E3-ELECTRICS"
        ata_chapters: ["33", "39"]
      L1:
        name: "L1-LOGICS"
        ata_chapters: []
        note: "Reserved as required"
      L2:
        name: "L2-LINKS"
        ata_chapters: ["34"]
      C1:
        name: "C1-COMMS"
        ata_chapters: ["23"]
      C2:
        name: "C2-CIRCULAR_CRYOGENIC_CELLS"
        ata_chapters: ["28"]
      I2:
        name: "I2-INTELLIGENCE"
        ata_chapters: ["95", "97"]
      A2:
        name: "A2-AVIONICS"
        ata_chapters: ["22", "42"]
      O:
        name: "O-OPERATING_SYSTEMS"
        ata_chapters: ["40"]
      P:
        name: "P-PROPULSION"
        ata_chapters: ["60", "61", "71", "72", "73", "74", "75", "76", "77", "78", "79", "80"]

  I_INFRA:
    name: "I-INFRASTRUCTURES"
    description: "Ground support equipment, H2 supply chain"
    ata_chapters: ["03", "08", "10", "12", "85"]
    note: "Infrastructure variants of ATA chapters"

  N:
    name: "N-NEURAL_NETWORKS"
    description: "AI/ML governance, traceability, DPP ledger"
    ata_chapters: ["96", "98"]

