<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypersonic Vehicle – LH₂ Propulsion &amp; Flight Profile</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: #f0f0f0;
  color: #111;
  font-size: 14px;
}

.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 24px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 56px 72px;
  margin-bottom: 48px;
  box-shadow: 0 1px 16px rgba(0,0,0,0.07);
}

/* ═══════════════════════════════════════════════════
   SECTION 1 – LH₂ THERMAL-PROPULSION COUPLING
═══════════════════════════════════════════════════ */

.diagram-title {
  text-align: center;
  color: #c8c8c8;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 0.01em;
  margin-bottom: 48px;
}

/* ═══════════════════════════════════════════════════
   SECTION 2 – FLIGHT PROFILE DASHBOARD
═══════════════════════════════════════════════════ */

.chart-caption {
  text-align: center;
  color: #888;
  font-size: 13.5px;
  margin-top: 10px;
  margin-bottom: 32px;
}

.phase-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 32px;
}

.phase-tab {
  flex: 1;
  padding: 14px 12px 12px;
  background: transparent;
  border: none;
  border-right: 1px solid #e4e4e4;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  font-size: 13px;
  color: #bbb;
  line-height: 1.35;
  transition: background 0.12s ease, color 0.12s ease;
}

.phase-tab:last-child { border-right: none; }

.phase-tab.active {
  background: #1e3d6e;
  color: #fff;
  border-radius: 6px;
}

.phase-tab .tab-num {
  font-weight: 700;
  font-size: 13.5px;
  display: block;
  margin-bottom: 4px;
}

.phase-tab .tab-mach {
  font-size: 12px;
  opacity: 0.7;
}

.phase-tab.active .tab-mach {
  color: rgba(255,255,255,0.82);
  opacity: 1;
}

/* Phase detail */
.phase-detail { margin-bottom: 28px; }

.phase-heading {
  font-size: 16px;
  font-weight: 500;
  color: #c8c8c8;
  margin-bottom: 18px;
  transition: color 0.15s;
}

.phase-heading.is-active { color: #1e3d6e; }

.detail-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 18px;
}

.detail-table td {
  padding: 5px 0;
  font-size: 13.5px;
  vertical-align: top;
  color: #c8c8c8;
  transition: color 0.15s;
}

.detail-table td:first-child {
  width: 190px;
  padding-right: 16px;
}

.detail-table.is-active td { color: #666; }
.detail-table.is-active td:first-child { color: #999; }

.phase-desc {
  font-size: 13.5px;
  line-height: 1.68;
  color: #c8c8c8;
  transition: color 0.15s;
}

.phase-desc.is-active { color: #333; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 18px;
}

.stat-card {
  background: #2a2a2a;
  border-radius: 6px;
  padding: 16px 14px;
  color: #fff;
}

.stat-label {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 7px;
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
}

.stat-value.small { font-size: 17px; }

/* Thermal load bar */
.thermal-row {
  display: flex;
  align-items: center;
  gap: 14px;
}

.thermal-label {
  font-size: 12.5px;
  color: #888;
  white-space: nowrap;
}

.thermal-bar-bg {
  flex: 1;
  height: 7px;
  background: #e8e8e8;
  border-radius: 4px;
  overflow: hidden;
}

.thermal-bar-fill {
  height: 100%;
  background: #28aa88;
  border-radius: 4px;
  transition: width 0.35s ease;
}

.thermal-pct {
  font-size: 12.5px;
  color: #888;
  flex: 0 0 32px;
  text-align: right;
}
</style>
</head>
<body>
<div class="page">

  <!-- ═══════════════════════════════════════════════════════════
       SECTION 1 – LH₂ Thermal-Propulsion Coupling (Cruise Phase)
       ═══════════════════════════════════════════════════════════ -->
  <div class="card">
    <div class="diagram-title">LH₂ thermal-propulsion coupling (cruise phase)</div>

      <!-- Arrow: regen ↓ scramjet (Hot H₂ gas) -->

      <!-- ── Aero heating ── -->
      <rect x="0"   y="355" width="218" height="78" rx="8" fill="#7a2010"/>
      <text x="109" y="385" fill="white" font-size="15" font-weight="700" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Aero heating</text>

      <!-- ── Forebody inlet ── -->
      <rect x="342" y="355" width="216" height="78" rx="8" fill="#1a5e50"/>
      <text x="450" y="385" fill="white" font-size="15" font-weight="700" text-anchor="middle"

            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Shock compression</text>

      <!-- Arrow: forebody → scramjet (Compressed air) -->
      <line x1="558" y1="394" x2="682" y2="394" stroke="#aaa" stroke-width="1.3"
            marker-end="url(#ah)"/>
      <text x="620" y="388" fill="#aaa" font-size="12" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Compressed air</text>

      <!-- ── Scramjet (ATA 72) ── -->
      <rect x="684" y="355" width="216" height="78" rx="8" fill="#7a6010"/>
      <text x="792" y="383" fill="white" font-size="15" font-weight="700" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Scramjet (ATA 72)</text>
      <text x="792" y="406" fill="rgba(255,255,255,0.86)" font-size="13" text-anchor="middle"

      <!-- Arrow: scramjet ↓ exhaust nozzle -->
      <line x1="792" y1="433" x2="792" y2="503" stroke="#aaa" stroke-width="1.3"
            marker-end="url(#ah)"/>

      <!-- ── Key insight ── -->
      <rect x="0" y="505" width="322" height="72" rx="8" fill="none"
            stroke="#d0d0d0" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="161" y="530" fill="#c8c8c8" font-size="13" font-weight="700" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Key insight</text>
      <text x="161" y="551" fill="#c8c8c8" font-size="12.5" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
        Thermal energy absorbed by LH₂ is recovered as propulsive work
      </text>

      <!-- ── Exhaust nozzle (ATA 78) ── -->
      <rect x="684" y="505" width="216" height="68" rx="8" fill="#3d3d3d"/>
      <text x="792" y="545" fill="white" font-size="15" font-weight="700" text-anchor="middle"
            font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Exhaust nozzle (ATA 78)</text>
    </svg>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SECTION 2 – Flight Profile Dashboard
       ═══════════════════════════════════════════════════════════ -->

<script>

  {

/* ─────────────────────────────────────────────────────
   selectPhase(index)  – zero-based
───────────────────────────────────────────────────── */
function selectPhase(idx) {
  var d = PHASES[idx];

  /* tabs */
  var tabs = document.querySelectorAll('.phase-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', i === idx);
  }

  /* heading */
  var heading = document.getElementById('phaseHeading');
  heading.textContent = d.heading;
  heading.className = 'phase-heading is-active';

  /* detail table */
  document.getElementById('d-mach').textContent  = d.mach;
  document.getElementById('d-alt').textContent   = d.alt;
  document.getElementById('d-dur').textContent   = d.dur;
  document.getElementById('d-prop').textContent  = d.prop;
  document.getElementById('d-skin').textContent  = d.skin;
  document.getElementById('d-therm').textContent = d.therm;
  document.getElementById('d-fuel').textContent  = d.fuel;
  document.getElementById('d-cert').textContent  = d.cert;
  document.getElementById('detailTable').className = 'detail-table is-active';

  /* description */
  var desc = document.getElementById('phaseDesc');
  desc.textContent = d.desc;
  desc.className = 'phase-desc is-active';

  /* stats */
  document.getElementById('s-mach').textContent = d.peakMach;
  document.getElementById('s-alt').textContent  = d.peakAlt;
  document.getElementById('s-skin').textContent = d.peakSkin;
  document.getElementById('s-prop').textContent = d.peakProp;

  /* thermal bar */
  document.getElementById('thermalBar').style.width = d.thermal + '%';
  document.getElementById('thermalPct').textContent  = d.thermal + '%';

  /* move chart dot */
  var dot = document.getElementById('phaseDot');
  if (dot) {
    dot.setAttribute('cx', d.dotX);
    dot.setAttribute('cy', d.dotY);
  }
}

/* Initialise with phase 1 */
selectPhase(0);
</script>
