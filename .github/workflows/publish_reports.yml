name: Publish Reports

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish_reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate audit report
        run: python3 08_AUTOMATION/scripts/generate_audit_report.py

      - name: Detect orphans
        run: python3 08_AUTOMATION/scripts/detect_orphans.py
