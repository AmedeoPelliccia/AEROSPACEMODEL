# =============================================================================
# CGen — Continuous Generation Workflow
# =============================================================================
# Generates ATA 03 Ground Support Equipment and H2 GSE infrastructure metadata
# under OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/.
#
# Authority: ASIT (Aircraft Systems Information Transponder)
# Compliance: S1000D Issue 5.0, TLI v2.1
# =============================================================================

name: CGen — Continuous Generation

on:
  push:
    paths:
      - "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/**"
      - "lifecycle/LC_PHASE_REGISTRY.yaml"
      - "ASIGT/brex/*.yaml"
      - "schemas/ampel360_*.yaml"
      - "schemas/ampel360_*.json"
      - "templates/cgen/**"
      - "scripts/cgen_*.py"
  schedule:
    # Every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: "Generation mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - docs-only
          - indexes-only
      dry_run:
        description: "Dry run (no files written, no PR created)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

# Prevent concurrent CGen runs to avoid race conditions on generated files
concurrency:
  group: cgen-${{ github.ref }}
  cancel-in-progress: false

env:
  # Real verified repo paths — DO NOT change to wrong path
  CGEN_TARGET_ATA03: "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_03-SUPPORT_INFRA"
  CGEN_TARGET_H2GSE: "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_IN_H2_GSE_AND_SUPPLY_CHAIN"
  CGEN_REPORTS_DIR: "cd/reports"
  # Maximum net line deletions allowed by the anti-deletion guard
  MAX_NET_DELETIONS: "200"

# ---------------------------------------------------------------------------
# Job 1: preflight — validate prerequisites before generation
# ---------------------------------------------------------------------------
jobs:
  preflight:
    name: Preflight Validation
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve-mode.outputs.mode }}
      dry_run: ${{ steps.resolve-mode.outputs.dry_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve run mode and dry-run flag
        id: resolve-mode
        run: |
          # Default: full / not dry-run
          MODE="${{ github.event.inputs.mode || 'full' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "Resolved mode: ${MODE}, dry_run: ${DRY_RUN}"

      - name: Validate target directories exist
        run: |
          set -euo pipefail
          echo "=== Validating I-INFRASTRUCTURES directory structure ==="

          INFRA_ROOT="OPT-IN_FRAMEWORK/I-INFRASTRUCTURES"

          REQUIRED_DIRS=(
            "${INFRA_ROOT}/M1-MANUFACTURING_FACILITIES"
            "${INFRA_ROOT}/M2-MAINTENANCE_ENVIRONMENTS"
            "${INFRA_ROOT}/O-OPERATIONS_SERVICE_STRUCTURES"
            "${INFRA_ROOT}/O-OPERATIONS_SERVICE_STRUCTURES/ATA_03-SUPPORT_INFRA"
            "${INFRA_ROOT}/O-OPERATIONS_SERVICE_STRUCTURES/ATA_IN_H2_GSE_AND_SUPPLY_CHAIN"
            "lifecycle"
          )

          FAILED=0
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "${dir}" ]; then
              echo "  ✓ ${dir}"
            else
              echo "  ✗ MISSING: ${dir}"
              FAILED=1
            fi
          done

          if [ "${FAILED}" -eq 1 ]; then
            echo "❌ Required directories missing — aborting CGen"
            exit 1
          fi
          echo "✓ All required directories present"

      - name: Validate lifecycle registry integrity
        run: |
          set -euo pipefail
          echo "=== Validating lifecycle/LC_PHASE_REGISTRY.yaml ==="

          python3 - <<'PYEOF'
          import sys
          import yaml
          from pathlib import Path

          registry_path = Path("lifecycle/LC_PHASE_REGISTRY.yaml")
          if not registry_path.exists():
              print(f"✗ Registry not found: {registry_path}")
              sys.exit(1)

          with registry_path.open() as fh:
              data = yaml.safe_load(fh)

          if data is None:
              print("✗ Registry is empty")
              sys.exit(1)

          # Verify top-level keys
          required_keys = {"meta", "precedence_model", "plm_phases", "ops_phases",
                           "baseline_rules", "constraints", "governance", "traceability"}
          present_keys = set(data.keys())
          missing = required_keys - present_keys
          if missing:
              print(f"✗ Missing top-level keys: {missing}")
              sys.exit(1)

          # Verify LC01-LC14 are all present
          plm = data["plm_phases"]
          ops = data["ops_phases"]
          all_phases = {**plm, **ops}

          expected = {f"LC{i:02d}" for i in range(1, 15)}
          found = set(all_phases.keys())
          missing_phases = expected - found
          if missing_phases:
              print(f"✗ Missing lifecycle phases: {sorted(missing_phases)}")
              sys.exit(1)

          print(f"✓ Lifecycle registry valid: {len(all_phases)} phases (LC01-LC14)")
          print(f"  PLM phases: {sorted(plm.keys())}")
          print(f"  OPS phases: {sorted(ops.keys())}")
          PYEOF

      - name: Validate BREX files loadable
        run: |
          set -euo pipefail
          echo "=== Validating ASIGT/brex/*.yaml ==="

          python3 - <<'PYEOF'
          import sys
          import yaml
          from pathlib import Path

          brex_dir = Path("ASIGT/brex")
          brex_files = list(brex_dir.glob("*.yaml"))

          if not brex_files:
              print(f"✗ No BREX files found in {brex_dir}")
              sys.exit(1)

          errors = []
          for brex_file in sorted(brex_files):
              try:
                  with brex_file.open() as fh:
                      data = yaml.safe_load(fh)
                  if data is None:
                      errors.append(f"  ⚠ Empty BREX file: {brex_file.name}")
                      continue

                  # Verify the default BREX has brex.rules structure
                  if brex_file.name == "S1000D_5.0_DEFAULT.yaml":
                      brex_root = data.get("brex", {})
                      if "rules" not in brex_root:
                          errors.append(f"  ✗ {brex_file.name}: missing 'brex.rules' key")
                          continue
                      print(f"  ✓ {brex_file.name}: brex.rules present")
                  else:
                      print(f"  ✓ {brex_file.name}: valid YAML")
              except yaml.YAMLError as exc:
                  errors.append(f"  ✗ {brex_file.name}: YAML parse error: {exc}")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)

          print(f"✓ All {len(brex_files)} BREX files valid")
          PYEOF

      - name: Validate active contracts (skip if none)
        run: |
          set -euo pipefail
          echo "=== Validating ASIT/CONTRACTS/active/*.yaml ==="

          python3 - <<'PYEOF'
          import sys
          import yaml
          from pathlib import Path

          contracts_dir = Path("ASIT/CONTRACTS/active")
          if not contracts_dir.exists():
              print("⚠ ASIT/CONTRACTS/active/ not found — skipping contract validation")
              sys.exit(0)

          contract_files = [f for f in contracts_dir.glob("*.yaml") if f.stat().st_size > 10]
          if not contract_files:
              print("ℹ No active contracts found (only .gitkeep or empty dir) — skipping")
              sys.exit(0)

          errors = []
          for cf in sorted(contract_files):
              try:
                  with cf.open() as fh:
                      data = yaml.safe_load(fh)
                  if data:
                      print(f"  ✓ {cf.name}")
                  else:
                      print(f"  ⚠ Empty contract: {cf.name}")
              except yaml.YAMLError as exc:
                  errors.append(f"  ✗ {cf.name}: {exc}")

          if errors:
              for err in errors:
                  print(err)
              sys.exit(1)

          print(f"✓ {len(contract_files)} active contract(s) valid")
          PYEOF

  # ---------------------------------------------------------------------------
  # Job 2: cgen — run generation scripts
  # ---------------------------------------------------------------------------
  cgen:
    name: Content Generation
    runs-on: ubuntu-latest
    needs: preflight
    env:
      MODE: ${{ needs.preflight.outputs.mode }}
      DRY_RUN: ${{ needs.preflight.outputs.dry_run }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Resolve generation timestamp
        id: timestamp
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "ts=${TS}" >> "$GITHUB_OUTPUT"
          echo "date=${TS:0:10}" >> "$GITHUB_OUTPUT"
          echo "Timestamp: ${TS}"

      - name: Create reports directory
        run: mkdir -p "${{ env.CGEN_REPORTS_DIR }}"

      - name: Run cgen_ata03.py (ATA 03 GSE)
        if: env.MODE == 'full' || env.MODE == 'docs-only'
        run: |
          DRY_FLAG=""
          [ "${{ env.DRY_RUN }}" = "true" ] && DRY_FLAG="--dry-run"
          python scripts/cgen_ata03.py \
            --output-dir "${{ env.CGEN_TARGET_ATA03 }}" \
            --timestamp "${{ steps.timestamp.outputs.ts }}" \
            --manifest-out "${{ env.CGEN_REPORTS_DIR }}/cgen_ata03_manifest.json" \
            $DRY_FLAG \
            --verbose

      - name: Run cgen_h2gse.py (H2 GSE stubs)
        if: env.MODE == 'full' || env.MODE == 'docs-only'
        run: |
          DRY_FLAG=""
          [ "${{ env.DRY_RUN }}" = "true" ] && DRY_FLAG="--dry-run"
          python scripts/cgen_h2gse.py \
            --output-dir "${{ env.CGEN_TARGET_H2GSE }}" \
            --timestamp "${{ steps.timestamp.outputs.ts }}" \
            --manifest-out "${{ env.CGEN_REPORTS_DIR }}/cgen_h2gse_manifest.json" \
            $DRY_FLAG \
            --verbose

      - name: Run cgen_indexes.py (ATA 03 index)
        if: env.MODE == 'full' || env.MODE == 'indexes-only'
        run: |
          DRY_FLAG=""
          [ "${{ env.DRY_RUN }}" = "true" ] && DRY_FLAG="--dry-run"
          python scripts/cgen_indexes.py \
            --output-dir "${{ env.CGEN_TARGET_ATA03 }}" \
            --timestamp "${{ steps.timestamp.outputs.ts }}" \
            $DRY_FLAG \
            --verbose

      - name: Run cgen_indexes.py (H2 GSE index)
        if: env.MODE == 'full' || env.MODE == 'indexes-only'
        run: |
          DRY_FLAG=""
          [ "${{ env.DRY_RUN }}" = "true" ] && DRY_FLAG="--dry-run"
          python scripts/cgen_indexes.py \
            --output-dir "${{ env.CGEN_TARGET_H2GSE }}" \
            --timestamp "${{ steps.timestamp.outputs.ts }}" \
            $DRY_FLAG \
            --verbose

      - name: Post-generation YAML validation
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          echo "=== Post-generation YAML validation ==="
          python3 - <<'PYEOF'
          import sys
          import yaml
          from pathlib import Path

          targets = [
              Path("OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_03-SUPPORT_INFRA"),
              Path("OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_IN_H2_GSE_AND_SUPPLY_CHAIN"),
          ]

          errors = []
          total = 0
          for target in targets:
              for meta_file in sorted(target.glob("*.meta.yaml")):
                  try:
                      with meta_file.open() as fh:
                          data = yaml.safe_load(fh)
                      if data is None:
                          errors.append(f"Empty: {meta_file}")
                          continue
                      # Require essential fields
                      for field in ("record_id", "status", "ata_chapter", "lc_phase"):
                          if field not in data:
                              errors.append(f"Missing field '{field}' in {meta_file.name}")
                      total += 1
                      print(f"  ✓ {meta_file.name}")
                  except yaml.YAMLError as exc:
                      errors.append(f"YAML error in {meta_file.name}: {exc}")

          if errors:
              print(f"\n❌ {len(errors)} validation error(s):")
              for err in errors:
                  print(f"  - {err}")
              sys.exit(1)

          print(f"\n✓ {total} generated YAML files validated")
          PYEOF

      - name: Path-fence guard
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          echo "=== Path-fence guard ==="

          ALLOWED_PATHS=(
            "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/"
            "cd/reports/"
          )

          # Get list of changed files vs base
          CHANGED=$(git diff --name-only HEAD 2>/dev/null || true)
          if [ -z "${CHANGED}" ]; then
            echo "No changes detected — path-fence passed"
            exit 0
          fi

          VIOLATIONS=""
          while IFS= read -r file; do
            ALLOWED=0
            for pattern in "${ALLOWED_PATHS[@]}"; do
              if [[ "${file}" == ${pattern}* ]]; then
                ALLOWED=1
                break
              fi
            done
            if [ "${ALLOWED}" -eq 0 ]; then
              VIOLATIONS="${VIOLATIONS}\n  ✗ OUTSIDE ALLOWED PATH: ${file}"
            fi
          done <<< "${CHANGED}"

          if [ -n "${VIOLATIONS}" ]; then
            echo "❌ Path-fence violation(s) detected:"
            echo -e "${VIOLATIONS}"
            exit 1
          fi
          echo "✓ Path-fence guard passed — all changes within allowed paths"

      - name: Anti-deletion guard
        if: env.DRY_RUN != 'true'
        run: |
          set -euo pipefail
          echo "=== Anti-deletion guard (max net deletions: ${{ env.MAX_NET_DELETIONS }}) ==="

          # Count net line deletions (deletions minus additions)
          STATS=$(git diff --stat HEAD 2>/dev/null || echo "")
          if [ -z "${STATS}" ]; then
            echo "No changes to check — anti-deletion guard passed"
            exit 0
          fi

          # Extract deletion count from git diff --shortstat
          SHORTSTAT=$(git diff --shortstat HEAD 2>/dev/null || echo "")
          DELETIONS=$(echo "${SHORTSTAT}" | grep -oP '\d+(?= deletion)' || echo "0")
          INSERTIONS=$(echo "${SHORTSTAT}" | grep -oP '\d+(?= insertion)' || echo "0")
          NET_DELETIONS=$(( DELETIONS - INSERTIONS ))

          echo "  Insertions: ${INSERTIONS}"
          echo "  Deletions:  ${DELETIONS}"
          echo "  Net deletions: ${NET_DELETIONS}"

          if [ "${NET_DELETIONS}" -gt "${{ env.MAX_NET_DELETIONS }}" ]; then
            echo "❌ Net deletions (${NET_DELETIONS}) exceed limit (${{ env.MAX_NET_DELETIONS }})"
            exit 1
          fi
          echo "✓ Anti-deletion guard passed (${NET_DELETIONS} ≤ ${{ env.MAX_NET_DELETIONS }})"

      - name: Run cgen_reports.py
        if: env.DRY_RUN != 'true'
        run: |
          # Merge partial manifests into a combined manifest
          python3 - <<'PYEOF'
          import json
          import hashlib
          from pathlib import Path

          repo_root = Path(".")
          reports_dir = repo_root / "cd" / "reports"
          reports_dir.mkdir(parents=True, exist_ok=True)

          all_files = []
          partial_manifests = list(reports_dir.glob("cgen_*_manifest.json"))
          for pm in sorted(partial_manifests):
              try:
                  data = json.loads(pm.read_text())
                  all_files.extend(data.get("files", []))
              except Exception as e:
                  print(f"Warning: could not read {pm}: {e}")

          ts = "${{ steps.timestamp.outputs.ts }}"
          manifest_id = "CGEN-MANIFEST-" + ts.replace("-", "").replace(":", "").replace("T", "T").replace("Z", "Z")

          updated_files = []
          for f in all_files:
              file_path = repo_root / f["path"]
              if file_path.exists():
                  sha = hashlib.sha256(file_path.read_bytes()).hexdigest()
                  updated_files.append({**f, "sha256": sha})
              else:
                  updated_files.append(f)

          manifest = {
              "manifest_id": manifest_id,
              "generated_at": ts,
              "cgen_version": "1.0.0",
              "run_mode": "${{ env.MODE }}",
              "dry_run": False,
              "summary": {
                  "total_files": len(updated_files),
                  "files_created": sum(1 for f in updated_files if f.get("action") == "created"),
                  "files_updated": sum(1 for f in updated_files if f.get("action") == "updated"),
                  "files_unchanged": sum(1 for f in updated_files if f.get("action") == "unchanged"),
                  "targets": [
                      "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_03-SUPPORT_INFRA",
                      "OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_IN_H2_GSE_AND_SUPPLY_CHAIN",
                  ],
              },
              "files": updated_files,
          }

          out_path = reports_dir / "cgen_manifest.json"
          out_path.write_text(json.dumps(manifest, indent=2, ensure_ascii=False))
          print(f"Manifest written: {out_path} ({manifest['summary']['total_files']} files)")
          PYEOF

          python scripts/cgen_reports.py \
            --output-dir "${{ env.CGEN_REPORTS_DIR }}" \
            --timestamp "${{ steps.timestamp.outputs.ts }}" \
            --manifest "${{ env.CGEN_REPORTS_DIR }}/cgen_manifest.json" \
            --run-mode "${{ env.MODE }}" \
            --verbose

      - name: Check for meaningful changes
        id: check-changes
        if: env.DRY_RUN != 'true'
        run: |
          # Count non-gitkeep changes
          CHANGED=$(git diff --name-only HEAD 2>/dev/null | grep -v '\.gitkeep$' || true)
          if [ -z "${CHANGED}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ No meaningful changes (only .gitkeep files or no changes)"
          else
            COUNT=$(echo "${CHANGED}" | wc -l | tr -d ' ')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "change_count=${COUNT}" >> "$GITHUB_OUTPUT"
            echo "✓ ${COUNT} meaningful file(s) changed"
            echo "${CHANGED}"
          fi

      - name: Upload generation artifacts
        if: env.DRY_RUN != 'true' && steps.check-changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cgen-artifacts-${{ steps.timestamp.outputs.date }}
          path: |
            ${{ env.CGEN_REPORTS_DIR }}/
            ${{ env.CGEN_TARGET_ATA03 }}/
            ${{ env.CGEN_TARGET_H2GSE }}/
          retention-days: 30
          if-no-files-found: warn

      - name: Create pull request
        if: |
          env.DRY_RUN != 'true' &&
          steps.check-changes.outputs.has_changes == 'true' &&
          github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(cgen): generate ATA 03 GSE infrastructure content

            Generated by CGen workflow at ${{ steps.timestamp.outputs.ts }}
            Mode: ${{ env.MODE }}
            Files: ${{ steps.check-changes.outputs.change_count }}
          branch: cgen/ata03-infra-${{ steps.timestamp.outputs.date }}
          delete-branch: true
          title: "chore(cgen): ATA 03 GSE infrastructure content — ${{ steps.timestamp.outputs.date }}"
          body: |
            ## CGen: ATA 03 Ground Support Equipment Infrastructure

            Generated by the **CGen** (Continuous Generation) workflow at `${{ steps.timestamp.outputs.ts }}`.

            ### Scope

            | Target | Description |
            | ------ | ----------- |
            | `OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_03-SUPPORT_INFRA/` | ATA 03 GSE metadata records |
            | `OPT-IN_FRAMEWORK/I-INFRASTRUCTURES/O-OPERATIONS_SERVICE_STRUCTURES/ATA_IN_H2_GSE_AND_SUPPLY_CHAIN/` | H2 GSE stub records |
            | `cd/reports/` | Generation manifest and reports |

            ### Generation Parameters

            | Parameter | Value |
            | --------- | ----- |
            | **Mode** | `${{ env.MODE }}` |
            | **Timestamp** | `${{ steps.timestamp.outputs.ts }}` |
            | **Trigger** | `${{ github.event_name }}` |
            | **Files Changed** | `${{ steps.check-changes.outputs.change_count }}` |

            ### Guards Applied

            - ✅ **Path-fence**: All changes under allowed paths
            - ✅ **Anti-deletion**: Net deletions ≤ ${{ env.MAX_NET_DELETIONS }}
            - ✅ **YAML validation**: All generated `.meta.yaml` parseable

            ### Review Checklist

            - [ ] ATA 03 `.meta.yaml` files have correct `record_id` format
            - [ ] `novel_technology: true` correctly set for H2-specific items (ATA 03-70, ATA IN-*)
            - [ ] `status: DRAFT` for ATA 03 records, `status: PLACEHOLDER` for H2 GSE stubs
            - [ ] All `lc_phase` values are infrastructure-relevant (LC04, LC06, LC10, LC11, LC12)
            - [ ] Cross-references point to existing paths
            - [ ] `README.md` and `00_INDEX.md` updated correctly
            - [ ] `cd/reports/cgen_manifest.json` contains valid checksums

            ---
            _Auto-generated — do not edit generated files directly. Re-run CGen to regenerate._
          labels: |
            cgen
            infrastructure
            ata-03
          draft: false
