hazard_record:
  required_fields:
    - hazard_id
    - title
    - description
    - phase
    - severity
    - probability
    - risk_level
    - mitigation_refs
  optional_fields:
    - sar_ref
    - residual_risk
    - accepted_by
    - acceptance_date
