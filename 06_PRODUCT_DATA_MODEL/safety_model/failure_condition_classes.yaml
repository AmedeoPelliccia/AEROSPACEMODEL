# Failure Condition Classes — AEROSPACEMODEL
# Path: 06_PRODUCT_DATA_MODEL/safety_model/failure_condition_classes.yaml
# Authority: ASIT  
# Status: ACTIVE
# Reference: ARP4761A / CS-25.1309

failure_condition_classes:
  - class: CATASTROPHIC
    description: May cause multiple fatalities; loss of aircraft
    qualitative_probability: Extremely Improbable
    quantitative_target: "< 1e-9 per flight hour"
    dal: A
  - class: HAZARDOUS
    description: Large reduction in safety margins; crew incapacitation
    qualitative_probability: Extremely Remote
    quantitative_target: "< 1e-7 per flight hour"
    dal: B
  - class: MAJOR
    description: Significant reduction in safety margins; increased crew workload
    qualitative_probability: Remote
    quantitative_target: "< 1e-5 per flight hour"
    dal: C
  - class: MINOR
    description: Slight reduction in safety margins; some increase in crew workload
    qualitative_probability: Reasonably Probable
    quantitative_target: "< 1e-3 per flight hour"
    dal: D
  - class: NO_SAFETY_EFFECT
    description: No effect on safety
    dal: E
