allocation_rules:
  - rule: Every system requirement must be allocated to at least one domain element
  - rule: Safety requirements must be allocated with traceability to the safety assessment source
  - rule: Allocated requirements must be verified at the element level
  - rule: Unallocated requirements are nonconformances
